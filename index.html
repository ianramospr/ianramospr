<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ian Ramos — Designer & Developer</title>
  <meta name="description" content="Ian Ramos (@ianramospr) — a designer and developer crafting thoughtful digital experiences." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" aria-label="Site navigation">
    <a href="#hero-heading" class="nav__logo" aria-label="Ian Ramos home">
      <img src="IAN.svg" alt="Ian Ramos" width="515" height="200" />
    </a>
    <a href="mailto:hello@ianramospr.com" class="nav__cta" id="nav-cta">Say hello ↗</a>
  </nav>

  <!-- HERO -->
  <section class="hero" aria-labelledby="hero-heading">
    <p class="hero__eyebrow reveal">Based in Puerto Rico</p>
    <h1 class="hero__heading" id="hero-heading">
      <span class="reveal">Crafting things</span>
      <span class="reveal delay-1"><em>people love</em></span>
      <span class="reveal delay-2">to use.</span>
    </h1>
    <p class="hero__sub reveal delay-3">
      I design and build digital products — clean, focused, intentional.
    </p>
    <div class="hero__scroll reveal delay-4" aria-hidden="true">
      <span class="hero__scroll-line"></span>
    </div>
  </section>

  <!-- PRINCIPLE -->
  <section class="section principle" aria-labelledby="principle-heading">
    <div class="principle__body">
      <h2 class="principle__heading reveal" id="principle-heading">
        Make it clear.<br/><em>Make it feel inevitable.</em>
      </h2>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section contact" aria-labelledby="contact-heading">
    <div class="section__label reveal">Let's talk</div>
    <div class="contact__body">
      <h2 class="contact__heading reveal" id="contact-heading">
        Have something in mind?<br/><em>Let's make it real.</em>
      </h2>
      <a href="mailto:hello@ianramospr.com" class="contact__link reveal delay-1" id="contact-email">
        hello@ianramospr.com
        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 16L16 4M16 4H8M16 4V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__links" aria-label="Social links">
      <a href="https://instagram.com/ianramospr" target="_blank" rel="noopener noreferrer" id="footer-instagram" aria-label="Instagram">
        <img src="instagram.svg" alt="" width="24" height="24" />
      </a>
      <a href="https://threads.net/@ianramospr" target="_blank" rel="noopener noreferrer" id="footer-threads" aria-label="Threads">
        <img src="threads.svg" alt="" width="24" height="24" />
      </a>
      <a href="https://github.com/ianramospr" target="_blank" rel="noopener noreferrer" id="footer-github" aria-label="GitHub">
        <img src="github.svg" alt="" width="24" height="24" />
      </a>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
